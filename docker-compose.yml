version: '3.8'

services:
  # --- BASE DE DATOS MYSQL ---
  mysql-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: donaton_db
    volumes:
      - mysql_data:/var/lib/mysql

  # --- INTERFAZ GRÁFICA (Opcional pero recomendada) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql-db
    depends_on:
      - mysql-db

  # --- MICROSERVICIOS ---
  donation-service:
    build:
      context: ./donaton-backend/donation-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/donaton_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  logistics-service:
    build:
      context: ./donaton-backend/logistics-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/donaton_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  # --- BFF ---
  bff-service:
    build:
      context: ./donaton-backend/bff-service
    ports:
      - "8080:8080"
    depends_on:
      - donation-service
      - logistics-service

  # --- FRONTEND ---
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./donaton-frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"

volumes:
  mysql_data: